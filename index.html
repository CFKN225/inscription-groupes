<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inscription Groupes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#07090f;--surface:#0e1018;--card:#13161f;--border:#232636;--accent:#f5c842;--accent2:#e85d04;--green:#06d6a0;--red:#ef233c;--blue:#4cc9f0;--text:#e4e6f0;--muted:#555877;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 16px 80px;background-image:radial-gradient(ellipse 70% 35% at 50% 0%,rgba(245,200,66,.07) 0%,transparent 55%),repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(255,255,255,.012) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(255,255,255,.012) 48px);}
header{text-align:center;margin-bottom:36px;}
header h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;color:var(--accent);letter-spacing:-1px;text-shadow:0 0 50px rgba(245,200,66,.25);}
header p{color:var(--muted);font-family:'Space Mono',monospace;font-size:.65rem;margin-top:7px;letter-spacing:2px;text-transform:uppercase;}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse-dot 1.5s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.3;}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;max-width:1400px;margin:0 auto;}
.pool-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 16px 16px;position:relative;overflow:hidden;transition:border-color .3s;}
.pool-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s;}
.pool-card.p1a::before{opacity:1;}.pool-card.p1a{border-color:rgba(245,200,66,.25);}
.pool-card.p2a{border-color:rgba(76,201,240,.3);}.pool-card.p2a::before{background:linear-gradient(90deg,var(--blue),var(--green));opacity:1;}
.pool-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pool-title{font-size:1rem;font-weight:800;letter-spacing:1.5px;}
.pool-count{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);background:var(--surface);padding:3px 8px;border-radius:20px;border:1px solid var(--border);}
.timer-wrap{margin-bottom:12px;}
.timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.timer-label{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:6px;}
.badge{font-size:.52rem;padding:2px 6px;border-radius:20px;letter-spacing:1px;}
.bw{color:var(--muted);background:rgba(85,88,119,.1);border:1px solid rgba(85,88,119,.2);}
.bp{color:var(--accent2);background:rgba(232,93,4,.12);border:1px solid rgba(232,93,4,.3);}
.bt{color:var(--blue);background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.3);}
.tv{font-family:'Space Mono',monospace;font-size:.88rem;font-weight:700;color:var(--accent);}
.tv.p{color:var(--accent2);}.tv.e{color:var(--red);}.tv.t{color:var(--blue);}
.timer-track{height:3px;background:var(--border);border-radius:4px;overflow:hidden;}
.timer-fill{height:100%;border-radius:4px;transition:width .9s linear,background .4s;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.timer-fill.p{background:var(--accent2);}.timer-fill.e{background:var(--red);}.timer-fill.t{background:linear-gradient(90deg,var(--blue),var(--green));}
.open-all{font-family:'Space Mono',monospace;font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;pointer-events:none;}
.open-all.show{opacity:1;}
.waiting-frame{height:32px;margin-bottom:8px;position:relative;}
.waiting-badge{position:absolute;inset:0;padding:4px 10px;border-radius:8px;background:rgba(239,35,60,.08);border:1px solid rgba(239,35,60,.25);display:flex;align-items:center;justify-content:space-between;gap:8px;opacity:0;pointer-events:none;transition:opacity .3s;}
.waiting-badge.show{opacity:1;pointer-events:all;}
.waiting-text{font-family:'Space Mono',monospace;font-size:.52rem;color:#ef233c;letter-spacing:.5px;line-height:1.3;}
.waiting-btn{flex-shrink:0;padding:3px 8px;border:none;border-radius:6px;background:#ef233c;color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:.55rem;cursor:pointer;letter-spacing:1px;animation:pred .8s ease-in-out infinite alternate;}
@keyframes pred{from{box-shadow:0 0 6px rgba(239,35,60,.5);}to{box-shadow:0 0 18px rgba(239,35,60,.95);}}
.slots{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.slot{display:flex;flex-direction:column;gap:5px;}
.slot-header{display:flex;align-items:center;gap:7px;margin-bottom:1px;}
.slot-num{font-family:'Space Mono',monospace;font-size:.64rem;color:var(--muted);min-width:14px;}
.ba{font-family:'Space Mono',monospace;font-size:.53rem;padding:2px 7px;border-radius:20px;color:var(--accent);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.3);font-weight:700;}
.bh{font-family:'Space Mono',monospace;font-size:.53rem;padding:2px 7px;border-radius:20px;color:var(--muted);background:rgba(85,88,119,.1);border:1px solid rgba(85,88,119,.25);}
.slot-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fl{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding-left:2px;}
.wa-row{display:flex;gap:4px;align-items:center;}
.cs{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;padding:7px 4px;width:62px;outline:none;cursor:pointer;flex-shrink:0;-webkit-appearance:none;text-align:center;}
.cs:focus{border-color:var(--accent);}.cs option{background:#13161f;}
input[type=text],input[type=tel]{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:.75rem;padding:7px 9px;width:100%;outline:none;transition:border-color .2s;}
input[type=text]:focus,input[type=tel]:focus{border-color:var(--accent);}
input[type=text]{text-transform:uppercase;}
.cr{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;user-select:none;transition:border-color .2s;}
.cr:hover{border-color:rgba(6,214,160,.3);}
.cr input[type=checkbox]{width:14px;height:14px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.cr span{font-size:.7rem;color:var(--muted);line-height:1.3;}
.cr.done span{color:var(--green);}.cr.done{border-color:rgba(6,214,160,.25);}
.pub-btn{width:100%;margin-top:10px;padding:10px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:.75rem;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.pub-btn:disabled{background:var(--surface);color:var(--muted);border:1px solid var(--border);cursor:not-allowed;}
.pub-btn:not(:disabled){background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;box-shadow:0 4px 22px rgba(245,200,66,.2);}
.pub-btn:not(:disabled):hover{transform:translateY(-1px);}
.pub-btn.blink{animation:bpulse .7s ease-in-out infinite alternate;}
@keyframes bpulse{from{box-shadow:0 0 10px rgba(245,200,66,.4);}to{box-shadow:0 0 35px rgba(245,200,66,.95);transform:scale(1.025);}}
.bravo-ov{position:absolute;inset:0;border-radius:16px;background:rgba(6,214,160,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:10;opacity:0;pointer-events:none;transition:opacity .4s;}
.bravo-ov.show{opacity:1;}
.bravo-t{font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:-1px;}
.bravo-s{font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.85);letter-spacing:2px;text-transform:uppercase;}
.settings-panel{max-width:1400px;margin:0 auto 28px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.settings-panel label{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
.sg{display:flex;align-items:center;gap:10px;}
.settings-panel input[type=number]{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'Space Mono',monospace;font-weight:700;font-size:1.1rem;padding:6px 4px;width:48px;outline:none;text-align:center;-moz-appearance:textfield;}
.settings-panel input[type=number]::-webkit-inner-spin-button,.settings-panel input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
.cw{display:flex;align-items:center;gap:6px;}
.cb{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--accent);font-size:1.2rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;}
.cb:hover{background:rgba(245,200,66,.1);border-color:var(--accent);}
.ssep{width:1px;height:36px;background:var(--border);}
.sh{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted);line-height:1.5;}
.search-bar{max-width:1400px;margin:0 auto 20px;display:flex;align-items:center;gap:12px;}
.search-wrap{position:relative;max-width:280px;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Space Mono',monospace;font-size:.8rem;padding:9px 14px 9px 36px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.snf{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--red);letter-spacing:1px;}
.published-section{max-width:1400px;margin:0 auto;}
.pub-heading{font-size:1.3rem;font-weight:800;color:var(--green);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.pub-heading small{font-size:.7rem;color:var(--muted);font-weight:400;font-family:'Space Mono',monospace;}
.pub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.pub-card{background:rgba(6,214,160,.04);border:1px solid rgba(6,214,160,.2);border-radius:12px;padding:14px;animation:pop .35s ease;position:relative;overflow:hidden;transition:outline .2s;}
.pub-card::before{content:'';position:absolute;inset:-2px;border-radius:14px;background:conic-gradient(from var(--a,0deg),transparent 0deg,transparent 60deg,#00ff88 90deg,#afffdf 110deg,#fff 120deg,#afffdf 130deg,#00ff88 150deg,transparent 180deg,transparent 360deg);animation:sb 2.5s linear infinite;z-index:0;}
.pub-card::after{content:'';position:absolute;inset:2px;border-radius:12px;background:#0d1a14;z-index:1;}
.pub-card>*{position:relative;z-index:2;}
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false;}
@keyframes sb{from{--a:0deg;}to{--a:360deg;}}
.gloss{position:absolute;inset:2px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,rgba(255,255,255,0) 50%,rgba(0,255,136,.04) 100%);pointer-events:none;z-index:3;}
.pub-card.hl{outline:3px solid var(--accent);outline-offset:2px;}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.pc-head{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.pe{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.pe:last-child{border:none;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.da{background:var(--accent);}.dh{background:var(--muted);}
.pi{flex:1;min-width:0;}
.pn{font-size:.58rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pw{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:1px;}
.pr{display:inline-block;margin-top:3px;font-family:'Space Mono',monospace;font-size:.56rem;padding:1px 6px;border-radius:4px;color:var(--accent);background:rgba(245,200,66,.08);}
.pr.h{color:var(--muted);background:rgba(85,88,119,.1);}
.share-row{display:flex;margin-top:10px;}
.swa{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;cursor:pointer;border:none;text-decoration:none;transition:all .2s;background:#25d366;color:#fff;width:100%;}
.swa:hover{background:#1ebe5a;transform:translateY(-1px);}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;}
.loading-screen p{font-family:'Space Mono',monospace;color:var(--muted);font-size:.75rem;letter-spacing:2px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TIMER_TOTAL = 120;
const IDLE_PAUSE  = 15;
const fmt = s => String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');

const PAYS = [
  {label:"CI",code:"225",flag:"🇨🇮"},{label:"SN",code:"221",flag:"🇸🇳"},
  {label:"BJ",code:"229",flag:"🇧🇯"},{label:"TG",code:"228",flag:"🇹🇬"},
  {label:"BF",code:"226",flag:"🇧🇫"},{label:"ML",code:"223",flag:"🇲🇱"},
  {label:"NE",code:"227",flag:"🇳🇪"},{label:"GN",code:"224",flag:"🇬🇳"},
  {label:"CM",code:"237",flag:"🇨🇲"},{label:"FR",code:"33", flag:"🇫🇷"},
  {label:"BE",code:"32", flag:"🇧🇪"},{label:"CA",code:"1",  flag:"🇨🇦"},
];
const flagByCode = {};
PAYS.forEach(function(p){ flagByCode[p.code] = p.flag; });

function emptySlot(){ return {name:'',wa:'',code:'225',confirmed:false}; }
function emptySlots(n){ var a=[]; for(var i=0;i<n;i++) a.push(emptySlot()); return a; }

function buildText(pub, nbE) {
  var nbAbj = Math.ceil(nbE/2);
  var lines = pub.slots.map(function(s,i){
    var res = pub.phase===2?'ABJ':(i<nbAbj?'ABJ':'HORS ABJ');
    var code = s.code||'225';
    var flag = flagByCode[code]||'';
    var num  = '+'+code+s.wa.trim().replace(/\s+/g,'');
    return (i+1)+'. *'+s.name+'* ('+res+')\n   '+flag+' ['+code+'] Tel: '+num;
  });
  return '\ud83d\udccb *Groupe #'+pub.num+'* — '+pub.time+'\n\n'+lines.join('\n\n');
}

function waitFB(){ return new Promise(function(r){ (function c(){ window._fb?r(window._fb):setTimeout(c,50); })(); }); }

function ShareBtn(props) {
  var text = buildText(props.pub, props.nbE);
  var url  = 'https://wa.me/?text='+encodeURIComponent(text);
  return (
    React.createElement('div', {className:'share-row'},
      React.createElement('a', {className:'swa', href:url, target:'_blank', rel:'noopener noreferrer'},
        React.createElement('svg', {width:15, height:15, viewBox:'0 0 24 24', fill:'currentColor'},
          React.createElement('path', {d:'M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z'})
        ),
        '\ud83d\udcf2 Partager'
      )
    )
  );
}

function PoolCard(props) {
  var idx = props.idx, nbE = props.nbE, fb = props.fb;
  var nbAbj = Math.ceil(nbE/2);
  var cardKey = 'card_'+idx;

  var s0 = useState(function(){ return emptySlots(nbE); });
  var slots = s0[0], setSlots = s0[1];
  var s1 = useState(1); var phase = s1[0], setPhase = s1[1];
  var s2 = useState(TIMER_TOTAL); var timeLeft = s2[0], setTimeLeft = s2[1];
  var s3 = useState(false); var running = s3[0], setRunning = s3[1];
  var s4 = useState(false); var paused = s4[0], setPaused = s4[1];
  var s5 = useState(false); var expired = s5[0], setExpired = s5[1];
  var s6 = useState(false); var fbReady = s6[0], setFbReady = s6[1];
  var s7 = useState(false); var showWait = s7[0], setShowWait = s7[1];
  var s8 = useState(false); var showBravo = s8[0], setShowBravo = s8[1];
  var s9 = useState(0); var activeEd = s9[0], setActiveEd = s9[1];

  var timerRef = useRef(null);
  var idleRef  = useRef(null);
  var loopRef  = useRef(null);
  var wRef     = useRef(false);
  var runRef   = useRef(false);
  var pausRef  = useRef(false);
  var aeRef    = useRef(0);

  useEffect(function(){ runRef.current=running; },[running]);
  useEffect(function(){ pausRef.current=paused; },[paused]);
  useEffect(function(){ aeRef.current=activeEd; },[activeEd]);

  // Load from Firebase
  useEffect(function(){
    if (!fb) return;
    var r = fb.ref(fb.db, 'cards/'+cardKey);
    var unsub = fb.onValue(r, function(snap){
      var data = snap.val();
      if (!data){ setFbReady(true); return; }
      wRef.current = true;
      setSlots(data.slots || emptySlots(nbE));
      setPhase(data.phase || 1);
      setFbReady(true);
      setTimeout(function(){ wRef.current=false; }, 200);
    });
    return function(){ unsub(); };
  }, [fb, cardKey]);

  var saveDB = useCallback(function(ns, np){
    if (!fb || wRef.current) return;
    fb.set(fb.ref(fb.db,'cards/'+cardKey), {slots:ns, phase:np, updatedAt:Date.now()});
  }, [fb, cardKey]);

  var startTimer = useCallback(function(){
    clearInterval(timerRef.current);
    clearTimeout(idleRef.current);
    setTimeLeft(TIMER_TOTAL);
    setExpired(false);
    setPaused(false);
    setRunning(true);
  }, []);

  useEffect(function(){
    if (!running||paused||expired) return;
    timerRef.current = setInterval(function(){
      setTimeLeft(function(t){
        if (t<=1){ clearInterval(timerRef.current); setExpired(true); setRunning(false); return 0; }
        return t-1;
      });
    }, 1000);
    return function(){ clearInterval(timerRef.current); };
  }, [running, paused, expired]);

  useEffect(function(){
    if (expired && phase===1){ setPhase(2); setTimeout(startTimer, 400); }
  }, [expired, phase]);

  // 5s loop
  useEffect(function(){
    if (!fbReady) return;
    loopRef.current = setInterval(function(){
      if (aeRef.current > 0) return;
      var slotsNow = null;
      setSlots(function(cur){ slotsNow=cur; return cur; });
      if (!slotsNow) return;
      var unconf = slotsNow.filter(function(s){ return !s.confirmed; }).length;
      if (unconf===0) return;
      setShowWait(true);
      setTimeout(function(){ setShowWait(false); }, 2500);
    }, 5000);
    return function(){ clearInterval(loopRef.current); };
  }, [fbReady]);

  function onFocus(){
    setActiveEd(function(n){ var nx=n+1; aeRef.current=nx; return nx; });
    setShowWait(false);
  }
  function onBlur(){
    setActiveEd(function(n){ var nx=Math.max(0,n-1); aeRef.current=nx; return nx; });
  }

  function toggleConfirm(i){
    setSlots(function(prev){
      var next = prev.map(function(s,j){ return j===i?Object.assign({},s,{confirmed:!s.confirmed}):s; });
      if (phase===1&&!runRef.current&&!expired){
        var ok = next.slice(0,nbAbj).every(function(s){ return s.name.trim()&&s.wa.trim()&&s.confirmed; });
        if (ok) setTimeout(startTimer, 50);
      }
      if (runRef.current&&pausRef.current&&aeRef.current===0){
        clearTimeout(idleRef.current);
        setTimeout(function(){ setPaused(false); }, 100);
      }
      saveDB(next, phase);
      var allDone = next.every(function(s){ return s.name.trim()&&s.wa.trim()&&s.confirmed; });
      if (allDone){ setShowBravo(true); setTimeout(function(){ setShowBravo(false); }, 3500); }
      return next;
    });
  }

  function updateField(i, field, val){
    setSlots(function(prev){
      var next = prev.map(function(s,j){ return j===i?Object.assign({},s,function(){ var o={}; o[field]=val; return o; }()):s; });
      saveDB(next, phase);
      return next;
    });
  }

  function handlePublish(){
    if (!fb) return;
    var r = fb.ref(fb.db, 'groupeCounter');
    fb.onValue(r, function(snap){
      var cur = snap.val()||0;
      var num = cur+1;
      fb.set(fb.ref(fb.db,'groupeCounter'), num);
      fb.set(fb.ref(fb.db,'published/'+num), {
        num:num, slots:slots, phase:phase,
        time: new Date().toLocaleTimeString('fr-FR'),
        publishedAt: Date.now()
      });
      fb.set(fb.ref(fb.db,'cards/'+cardKey), {slots:emptySlots(nbE), phase:1, updatedAt:Date.now()});
      setTimeout(function(){
        var el = document.getElementById('pub-'+num);
        if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
      }, 400);
    }, {onlyOnce:true});
    setSlots(emptySlots(nbE)); setPhase(1); setTimeLeft(TIMER_TOTAL);
    setRunning(false); setPaused(false); setExpired(false);
    clearInterval(timerRef.current); clearTimeout(idleRef.current);
  }

  var tState = expired?'e':paused?'p':phase===2?'t':'';
  var pct = (timeLeft/TIMER_TOTAL)*100;
  var canPub = slots.every(function(s){ return s.name.trim()&&s.wa.trim()&&s.confirmed; });
  var filled = slots.filter(function(s){ return s.name.trim(); }).length;
  var missing = nbE - filled;

  if (!fbReady) return (
    React.createElement('div', {className:'pool-card'},
      React.createElement('div', {style:{textAlign:'center',padding:'20px',color:'var(--muted)',fontFamily:'Space Mono',fontSize:'.6rem'}}, '\u23f3 Chargement...')
    )
  );

  return (
    React.createElement('div', {className:'pool-card '+(running&&phase===1?'p1a':'')+(phase===2?' p2a':'')},
      React.createElement('div', {className:'bravo-ov '+(showBravo?'show':'')},
        React.createElement('div', {className:'bravo-t'}, '\ud83c\udf89 BRAVO !'),
        React.createElement('div', {className:'bravo-s'}, 'Bonne chance \xe0 tous')
      ),
      React.createElement('div', {className:'pool-header'},
        React.createElement('span', {className:'pool-title'}, 'GROUPE #'),
        React.createElement('span', {className:'pool-count'}, filled+'/'+nbE)
      ),
      React.createElement('div', {className:'timer-wrap'},
        React.createElement('div', {className:'timer-top'},
          React.createElement('span', {className:'timer-label'},
            'Timer',
            !running&&!expired&&phase===1 && React.createElement('span', {className:'badge bw'}, 'EN ATTENTE'),
            running&&paused && React.createElement('span', {className:'badge bp'}, '\u23f8 PAUSE'),
            phase===2 && React.createElement('span', {className:'badge bt'}, 'PHASE 2')
          ),
          React.createElement('span', {className:'tv '+(tState)},
            !running&&!expired&&phase===1?'--:--':fmt(timeLeft)
          )
        ),
        React.createElement('div', {className:'timer-track'},
          React.createElement('div', {className:'timer-fill '+(tState), style:{width:(running||expired?pct:0)+'%'}})
        )
      ),
      React.createElement('div', {className:'waiting-frame'},
        React.createElement('span', {className:'open-all '+(phase===2&&!showWait?'show':'')}, 'OUVERT \xc0 TOUS'),
        React.createElement('div', {className:'waiting-badge '+(showWait&&missing>0?'show':'')},
          React.createElement('span', {className:'waiting-text'},
            '\ud83d\udd50 En attente de ',
            React.createElement('strong', null, missing+' membre'+(missing>1?'s':''))
          ),
          React.createElement('button', {className:'waiting-btn', onClick:function(){ setShowWait(false); }}, 'REJOINDRE')
        )
      ),
      React.createElement('div', {className:'slots'},
        slots.map(function(slot, i){
          var isAbj = phase===2 || i<nbAbj;
          return React.createElement('div', {className:'slot', key:i},
            React.createElement('div', {className:'slot-header'},
              React.createElement('span', {className:'slot-num'}, i+1),
              React.createElement('span', {className:isAbj?'ba':'bh'}, isAbj?'\ud83d\udfe1 ABJ':'\u26ab HORS ABJ')
            ),
            React.createElement('div', {className:'slot-fields'},
              React.createElement('div', {className:'fg'},
                React.createElement('span', {className:'fl'}, 'Nom complet'),
                React.createElement('input', {type:'text', placeholder:'Pr\xe9nom Nom', value:slot.name,
                  onFocus:onFocus, onBlur:onBlur,
                  onChange:function(e){ updateField(i,'name',e.target.value.toUpperCase()); }})
              ),
              React.createElement('div', {className:'fg'},
                React.createElement('span', {className:'fl'}, 'WhatsApp'),
                React.createElement('div', {className:'wa-row'},
                  React.createElement('select', {className:'cs', value:slot.code,
                    onChange:function(e){ updateField(i,'code',e.target.value); }},
                    PAYS.map(function(p){ return React.createElement('option', {key:p.code, value:p.code}, '+'+p.code); })
                  ),
                  React.createElement('input', {type:'tel', placeholder:'07 00 00 00', value:slot.wa,
                    className:'wa-input', onFocus:onFocus, onBlur:onBlur,
                    onChange:function(e){ updateField(i,'wa',e.target.value); }})
                )
              )
            ),
            React.createElement('div', {
              className:'cr '+(slot.confirmed?'done':''),
              onClick:function(){ toggleConfirm(i); }
            },
              React.createElement('input', {type:'checkbox', checked:slot.confirmed, onChange:function(){},
                onClick:function(e){ e.stopPropagation(); toggleConfirm(i); }}),
              React.createElement('span', null, slot.confirmed?'\u2705 Confirm\xe9 — '+(isAbj?'Abidjan':'Hors Abidjan'):'Cochez pour confirmer votre saisie')
            )
          );
        })
      ),
      React.createElement('button', {
        className:'pub-btn '+(canPub?'blink':''),
        disabled:!canPub,
        onClick:handlePublish
      }, '\ud83d\udccb Publier la liste')
    )
  );
}

function App() {
  var s0 = useState(null); var fb = s0[0], setFb = s0[1];
  var s1 = useState([]); var published = s1[0], setPublished = s1[1];
  var s2 = useState(4); var nbE = s2[0], setNbE = s2[1];
  var s3 = useState(10); var nbC = s3[0], setNbC = s3[1];
  var s4 = useState(true); var loading = s4[0], setLoading = s4[1];
  var s5 = useState(''); var searchVal = s5[0], setSearchVal = s5[1];
  var s6 = useState(false); var snf = s6[0], setSnf = s6[1];

  useEffect(function(){
    waitFB().then(function(f){ setFb(f); });
  }, []);

  useEffect(function(){
    if (!fb) return;
    var r = fb.ref(fb.db, 'published');
    var unsub = fb.onValue(r, function(snap){
      var data = snap.val();
      if (data){
        var list = Object.values(data).sort(function(a,b){ return a.num-b.num; });
        setPublished(list);
      } else { setPublished([]); }
      setLoading(false);
    });
    return function(){ unsub(); };
  }, [fb]);

  function handleSearch(val){
    setSearchVal(val);
    setSnf(false);
    var num = parseInt(val);
    if (!val.trim()||isNaN(num)) return;
    var found = published.find(function(p){ return p.num===num; });
    if (found){
      setTimeout(function(){
        var el = document.getElementById('pub-'+num);
        if (el){
          el.scrollIntoView({behavior:'smooth', block:'center'});
          el.classList.add('hl');
          setTimeout(function(){ el.classList.remove('hl'); }, 2500);
        }
      }, 100);
    } else {
      setSnf(true);
      setTimeout(function(){ setSnf(false); }, 2500);
    }
  }

  var nbAbj = Math.ceil(nbE/2);

  if (loading) return (
    React.createElement('div', {className:'loading-screen'},
      React.createElement('div', {className:'spinner'}),
      React.createElement('p', null, 'CONNEXION EN COURS...')
    )
  );

  return React.createElement('div', null,
    React.createElement('header', null,
      React.createElement('h1', null, '\u26a1 INSCRIPTION GROUPES'),
      React.createElement('p', null, React.createElement('span', {className:'sync-dot'}), 'EN DIRECT \u00b7 Timer 2 min \u00b7 WhatsApp requis')
    ),
    React.createElement('div', {className:'settings-panel'},
      React.createElement('div', {className:'sg'},
        React.createElement('label', null, '\ud83d\udc65 \xc9tudiants / groupe'),
        React.createElement('div', {className:'cw'},
          React.createElement('button', {className:'cb', onClick:function(){ setNbE(function(n){ return Math.max(2,n-1); }); }}, '\u2212'),
          React.createElement('input', {type:'number', value:nbE, readOnly:true}),
          React.createElement('button', {className:'cb', onClick:function(){ setNbE(function(n){ return Math.min(20,n+1); }); }}, '+')
        )
      ),
      React.createElement('div', {className:'ssep'}),
      React.createElement('div', {className:'sg'},
        React.createElement('label', null, '\ud83d\uddc2\ufe0f Nombre de cartes'),
        React.createElement('div', {className:'cw'},
          React.createElement('button', {className:'cb', onClick:function(){ setNbC(function(n){ return Math.max(10,n-1); }); }}, '\u2212'),
          React.createElement('input', {type:'number', value:nbC, readOnly:true}),
          React.createElement('button', {className:'cb', onClick:function(){ setNbC(function(n){ return Math.min(50,n+1); }); }}, '+')
        )
      ),
      React.createElement('div', {className:'ssep'}),
      React.createElement('div', {className:'sh'},
        nbAbj+' place'+(nbAbj>1?'s':'')+' ABJ \u00b7 '+(nbE-nbAbj)+' Hors Abj',
        React.createElement('br'),
        'Sync Firebase \ud83d\udd25'
      )
    ),
    React.createElement('div', {className:'grid'},
      Array.from({length:nbC}, function(_,i){
        return React.createElement(PoolCard, {key:i+'-'+nbE, idx:i, nbE:nbE, fb:fb});
      })
    ),
    published.length>0 && React.createElement('div', null,
      React.createElement('div', {className:'search-bar'},
        React.createElement('div', {className:'search-wrap'},
          React.createElement('span', {className:'search-icon'}, '\ud83d\udd0d'),
          React.createElement('input', {
            className:'search-input', type:'number',
            placeholder:'N\u00b0 groupe\u2026', value:searchVal, min:'1',
            onChange:function(e){ handleSearch(e.target.value); }
          })
        ),
        snf && React.createElement('span', {className:'snf'}, 'Groupe '+searchVal+' introuvable')
      ),
      React.createElement('div', {className:'published-section'},
        React.createElement('div', {className:'pub-heading'},
          '\u2705 Groupes Publi\xe9s',
          React.createElement('small', null, published.length+' groupe'+(published.length>1?'s':''))
        ),
        React.createElement('div', {className:'pub-grid'},
          published.map(function(pub){
            var nA = Math.ceil(nbE/2);
            return React.createElement('div', {className:'pub-card', id:'pub-'+pub.num, key:pub.num},
              React.createElement('div', {className:'gloss'}),
              React.createElement('div', {className:'pc-head'}, 'Groupe #'+pub.num+' \u00b7 '+pub.time),
              pub.slots.map(function(s,i){
                var res = pub.phase===2?'ABJ':(i<nA?'ABJ':'HORS ABJ');
                return React.createElement('div', {className:'pe', key:i},
                  React.createElement('div', {className:'dot '+(res==='ABJ'?'da':'dh')}),
                  React.createElement('div', {className:'pi'},
                    React.createElement('div', {className:'pn'}, s.name),
                    React.createElement('div', {className:'pw'}, (flagByCode[s.code||'225']||'')+' +'+(s.code||'225')+s.wa),
                    React.createElement('span', {className:'pr '+(res==='ABJ'?'':'h')}, res)
                  )
                );
              }),
              React.createElement(ShareBtn, {pub:pub, nbE:nbE})
            );
          })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
